<!-- Q9: Write HTML & CSS code to display your mark sheet into web page -->

<!DOCTYPE html>
<html>
<head>
    <title>Mark Sheet</title>
    <style>
        body { font-family: Arial; }

        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th { background: darkblue; color: #fff; }

        .pass { color: green; }
        .total { background: lightgreen; font-weight: bold; }
    </style>
</head>

<body>

    <h2 align="center">Mark Sheet</h2>
    <h4 align="center">Name | Roll | Year</h4>

    <table>
        <tr>
            <th>S.No</th><th>Sub</th><th>FM</th><th>PM</th><th>Marks</th><th>Status</th>
        </tr>

        <tr><td>1</td><td>DAA</td><td>100</td><td>40</td><td>75</td><td class="pass">Pass</td></tr>
        <tr><td>2</td><td>WT</td><td>100</td><td>40</td><td>80</td><td class="pass">Pass</td></tr>
        <tr><td>3</td><td>Crypto</td><td>100</td><td>40</td><td>70</td><td class="pass">Pass</td></tr>

        <tr class="total">
            <td colspan="4">Total</td>
            <td>225</td>
            <td>Pass</td>
        </tr>
    </table>

</body>
</html>
