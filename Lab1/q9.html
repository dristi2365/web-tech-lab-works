<!-- Q9: Write HTML & CSS code to display your mark sheet into web page -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Sheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        h1, h3 {
            text-align: center;
        }
        table {
            width: 60%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        th {
            background-color: darkblue;
            color: white;
            padding: 10px;
        }
        td {
            text-align: center;
            padding: 10px;
            border: 1px solid #ccc;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .total {
            font-weight: bold;
            background-color: lightgreen;
        }
        .fail {
            color: red;
            font-weight: bold;
        }
        .pass {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Mark Sheet</h1>
    <h3>Name: Your Name | Roll No: XXXX | Year: 2024</h3>

    <table>
        <tr>
            <th>S.No</th>
            <th>Subject</th>
            <th>Full Marks</th>
            <th>Pass Marks</th>
            <th>Marks Obtained</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>1</td>
            <td>DAA</td>
            <td>100</td>
            <td>40</td>
            <td>75</td>
            <td class="pass">Pass</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Web Technology</td>
            <td>100</td>
            <td>40</td>
            <td>80</td>
            <td class="pass">Pass</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Cryptography</td>
            <td>100</td>
            <td>40</td>
            <td>70</td>
            <td class="pass">Pass</td>
        </tr>
        <tr>
            <td>4</td>
            <td>SAM</td>
            <td>100</td>
            <td>40</td>
            <td>65</td>
            <td class="pass">Pass</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Multimedia</td>
            <td>100</td>
            <td>40</td>
            <td>72</td>
            <td class="pass">Pass</td>
        </tr>
        <tr>
            <td>6</td>
            <td>SAD</td>
            <td>100</td>
            <td>40</td>
            <td>68</td>
            <td class="pass">Pass</td>
        </tr>
        <tr class="total">
            <td colspan="4">Total</td>
            <td>430</td>
            <td>Pass</td>
        </tr>
    </table>

</body>
</html>
