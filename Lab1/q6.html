<!-- Q6: Write HTML & CSS code to create basic web page layout using division -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Web Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        #header {
            background-color: red;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #navbar {
            background-color: salmon;
            padding: 15px;
            text-align: center;
        }
        #wrapper {
            display: flex;
        }
        #sidebar {
            background-color: gray;
            width: 20%;
            min-height: 200px;
            padding: 15px;
        }
        #content {
            background-color: lightgreen;
            width: 40%;
            min-height: 200px;
            padding: 15px;
        }
        #highlight {
            background-color: rgba(100, 167, 189, 0.856);
            width: 40%;
            min-height: 200px;
            padding: 15px;
        }
        #footer {
            background-color: #555;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div id="header">Header</div>

    <div id="navbar">Navbar</div>

    <div id="wrapper">
        <div id="sidebar">Sidebar</div>
        <div id="content">Content</div>
        <div id="highlight">Highlight</div>
    </div>

    <div id="footer">Footer</div>

</body>
</html>
