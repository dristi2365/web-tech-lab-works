<!-- Q5: Write HTML & CSS code to demonstrate different types of lists -->

<!DOCTYPE html>
<html>
<head>
   <title>Lists</title>
   <style>
      ul{list-style:disc;}
      ul.circle{list-style:circle;}
      ul.square{list-style:square;}
      ol.roman{list-style:upper-roman;}
      ol.alpha{list-style:upper-alpha;}
   </style>
</head>

<body>

   <h3>Unordered</h3>
   <ul><li>HTML</li><li>CSS</li></ul>
   <ul class="circle"><li>HTML</li><li>CSS</li></ul>
   <ul class="square"><li>HTML</li><li>CSS</li></ul>

   <h3>Ordered</h3>
   <ol><li>HTML</li><li>CSS</li></ol>
   <ol class="roman"><li>HTML</li><li>CSS</li></ol>
   <ol class="alpha"><li>HTML</li><li>CSS</li></ol>

   <h3>Description</h3>
   <dl>
      <dt>HTML</dt><dd>Structure</dd>
      <dt>CSS</dt><dd>Style</dd>
   </dl>

</body>
</html>
