<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of CSS</title>
    <style>
        #p1{
            color: green;
        }
    </style>
    <link rel="stylesheet" href="q4style.css" >
</head>
<body>
    <h1>Demonstrating different types of CSS</h1>

    <P id="p1">This paragraph use internal css</P>
    <P id="p2">This paragraph use external css</P>
</body>
</html>
