<!-- Q7: Write HTML code to divide web page into 3 frames 20% on left to show contents of pages, 60% in center to show body of page, remaining on right to show highlights -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frames Layout</title>
</head>

<frameset cols="20%, 60%, 20%">

    <frame src="left.html" name="leftFrame" title="Contents">

    <frame src="center.html" name="centerFrame" title="Body">

    <frame src="right.html" name="rightFrame" title="Highlights">

</frameset>

</html>
