<!DOCTYPE html>
<html>
<head>
    <title>CV</title>
    <style>
        body {
            font-family: Arial;
            margin: 10px;
            font-size: 14px;
        }
        .cv {
            width: 400px;
            margin: auto;
            border: 2px solid black;
            padding: 10px;
        }
        h1, h2 {
            color: darkblue;
            margin: 5px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 4px;
            text-align: center;
        }
        ul {
            margin: 5px 0 10px 18px;
        }
    </style>
</head>

   <div class="cv">

      <table>

         <tr><td>CSIT</td><td>Running</td><td>-</td></tr>
         <tr><td>+2</td><td>2023</td><td>3.42</td></tr>
      </table>

      <h2>Skills</h2>
      <ul>
        <li>HTML, CSS</li>

</html>
