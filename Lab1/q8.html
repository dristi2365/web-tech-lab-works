<!-- Q8: Write HTML & CSS code to display list box into web page -->

<!DOCTYPE html>
<html>
<head>
    <title>List Box</title>
    <style>
        body { font-family: Arial; }
        select { width: 200px; margin: 10px 0; }
    </style>
</head>

<body>
    <h3>Single Select</h3>
    <select size="5">
        <option>HTML</option>
        <option>CSS</option>
        <option>JS</option>
        <option>Python</option>
        <option>Java</option>
    </select>
    <h3>Multiple Select</h3>
    <select size="5" multiple>
        <option>HTML</option>
        <option>CSS</option>
        <option>JS</option>
        <option>Python</option>
        <option>Java</option>
    </select>
    <h3>Dropdown</h3>
    <select>
        <option>Select</option>
        <option>WT</option>
        <option>DAA</option>
    </select>
</body>
</html>
