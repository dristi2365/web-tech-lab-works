<!-- Q8: Write HTML & CSS code to display list box into web page -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        h2 {
            color: darkblue;
        }
        select {
            width: 200px;
            padding: 5px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>Single Selection List Box</h2>
    <select size="5">
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>Python</option>
        <option>Java</option>
    </select>

    <h2>Multiple Selection List Box</h2>
    <select size="5" multiple>
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
        <option>Python</option>
        <option>Java</option>
    </select>
    <p><small>Hold Ctrl to select multiple options</small></p>

    <h2>Dropdown List Box</h2>
    <select>
        <option>Select a subject</option>
        <option>Web Technology</option>
        <option>DAA</option>
        <option>Cryptography</option>
        <option>Multimedia</option>
        <option>SAD</option>
    </select>

</body>
</html>
