<!-- Q8: Write javascript functions to handle cookie operations: setCookie, getCookie, and deleteCookie -->

<!DOCTYPE html>
<html>
<head>
    <title>Cookies</title>
</head>

<body>

<h2>Cookie Demo</h2>

<h3>Set</h3>
Name: <input id="n"><br>
Value: <input id="v"><br>
Days: <input id="d" type="number"><br>
<button onclick="setC()">Set</button>
<p id="s"></p>

<h3>Get</h3>
<input id="gn">
<button onclick="getC()">Get</button>
<p id="g"></p>

<h3>Delete</h3>
<input id="dn">
<button onclick="delC()">Delete</button>
<p id="x"></p>

<script>
function setC(){
    let n=document.getElementById("n").value;
    let v=document.getElementById("v").value;
    let d=document.getElementById("d").value;

    let date=new Date();
    date.setTime(date.getTime()+d*86400000);

    document.cookie=n+"="+v+";expires="+date.toUTCString()+";path=/";
    document.getElementById("s").innerText="Cookie Set";
}

function getC(){
    let n=document.getElementById("gn").value;
    let cookies=document.cookie.split(";");

    for(let c of cookies){
        c=c.trim();
        if(c.startsWith(n+"=")){
            document.getElementById("g").innerText=c;
            return;
        }
    }

    document.getElementById("g").innerText="Not found";
}

function delC(){
    let n=document.getElementById("dn").value;
    document.cookie=n+"=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
    document.getElementById("x").innerText="Deleted";
}
</script>

</body>
</html>
