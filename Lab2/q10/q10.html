<!-- Q10: Create a button that loads content from an external file (data.html) into a div using AJAX -->

<!DOCTYPE html>
<html>
<head>
    <title>AJAX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

<h2>AJAX Load</h2>

<button id="btn">Load</button>
<div id="out">Content here</div>

<script>
$("#btn").click(function () {
    $("#out").load("data.html", function (res, status) {
        if (status == "error") $("#out").text("Error");
    });
});
</script>

</body>
</html>
