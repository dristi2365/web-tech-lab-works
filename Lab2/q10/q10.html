<!-- Q10: Create a button that loads content from an external file (data.html) into a div using AJAX -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJAX Load Content</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        button { padding: 8px 16px; background-color: darkblue; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #content { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h1>AJAX Load Content</h1>
    <button id="loadBtn">Load Content</button>
    <div id="content">Content will appear here...</div>

    <script>
        $(document).ready(function() {
            $("#loadBtn").click(function() {
                $("#content").load("data.html", function(response, status) {
                    if (status == "error") {
                        $("#content").html("Error loading content!");
                    }
                });
            });
        });
    </script>

</body>
</html>
