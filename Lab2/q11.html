<!-- Q11: Write a script to illustrate the concept of chaining using slideUp and slideDown method -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Chaining</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { margin: 30px; }
        #box { width: 300px; padding: 20px; background-color: lightblue; border-radius: 5px; margin-top: 20px; text-align: center; }
        button { padding: 8px 16px; background-color: darkblue; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <h1>jQuery Chaining</h1>
    <button id="chainBtn">SlideUp then SlideDown</button>

    <div id="box">
        <h3>I am a box!</h3>
        <p>Watch me slide up and down using chaining!</p>
    </div>

    <script>
        $(document).ready(function() {
            $("#chainBtn").click(function() {
                $("#box").slideUp(1000).slideDown(1000);
            });
        });
    </script>

</body>
</html>
