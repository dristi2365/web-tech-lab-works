<!-- Q1: Write a javascript program to display an alert message on button click -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alert on Button Click</title>
</head>
<body>

    <h1>Alert Message Demo</h1>
    <button onclick="showAlert()">Click Me</button>

    <script>
        function showAlert() {
            alert("Hello! Welcome to Web Technology!");
        }
    </script>

</body>
</html>
